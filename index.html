<!DOCTYPE html>
<html>

<head>
    <title>Village Kirana Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Welcome to Our Kirana Store</h1>
    <h3>Order Online & Pickup at Store</h3>

    <div class="products">

        <div class="item">
            <h4>Rice</h4>
            <p>₹50 / kg</p>
            <button onclick="addToCart('Rice')">Add</button>
        </div>

        <div class="item">
            <h4>Sugar</h4>
            <p>₹40 / kg</p>
            <button onclick="addToCart('Sugar')">Add</button>
        </div>

        <div class="item">
            <h4>Milk</h4>
            <p>₹25</p>
            <button onclick="addToCart('Milk')">Add</button>
        </div>

    </div>

    <h2>Cart</h2>
    <ul id="cart"></ul>

    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="phone" placeholder="Phone Number">

    <button onclick="placeOrder()">Place Order</button>

    <script src="script.js"></script>

</body>

</html>
